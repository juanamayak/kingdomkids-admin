<aside [class]="'fixed top-0 left-0 w-64 h-screen pt-16 transition-transform bg-sidebar border-r border-gray-200 z-40 ' + (isOpen() ? 'translate-x-0' : '-translate-x-full sm:translate-x-0')">
    <div class="h-full overflow-y-auto py-4 px-2 space-y-3">
        <ul class="space-y-1 text-sm">
            <li class="px-2 pb-2">
                <span class="text-white/40 uppercase text-xs font-semibold tracking-wider">Menú</span>
            </li>
            @for (item of menuItems; track item.label) {
                <li>
                    @if (item.children) {
                        <!-- Item con dropdown -->
                        <button
                            type="button"
                            (click)="toggleDropdown(item.label)"
                            class="flex items-center justify-between w-full py-2 px-4 text-white rounded-lg hover:bg-white/10 transition-colors">
                            <div class="flex items-center gap-3">
                                <i [class]="item.icon"></i>
                                <span>{{ item.label }}</span>
                            </div>
                            <i [ngClass]="isDropdownOpen(item.label) ? 'pi pi-chevron-up' : 'pi pi-chevron-down'"
                               class="text-xs transition-transform duration-200"></i>
                        </button>
                        @if (isDropdownOpen(item.label)) {
                            <ul class="py-2 space-y-1">
                                @for (child of item.children; track child.label) {
                                    <li>
                                        <a [routerLink]="[child.route]"
                                           routerLinkActive="bg-white/20"
                                           (click)="onNavigate()"
                                           class="flex items-center gap-3 py-2 ps-11 pe-4 text-white/80 rounded-lg hover:bg-white/10 hover:text-white transition-colors">
                                            <i [class]="child.icon + ' text-xs'"></i>
                                            <span>{{ child.label }}</span>
                                        </a>
                                    </li>
                                }
                            </ul>
                        }
                    } @else {
                        <!-- Item simple -->
                        <a [routerLink]="[item.route]"
                           routerLinkActive="bg-white/20"
                           (click)="onNavigate()"
                           class="flex items-center gap-3 py-2 px-4 text-white rounded-lg hover:bg-white/10 transition-colors">
                            <i [class]="item.icon"></i>
                            <span>{{ item.label }}</span>
                        </a>
                    }
                </li>
            }
        </ul>
    </div>
</aside>
