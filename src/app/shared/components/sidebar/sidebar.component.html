<aside [class]="'fixed top-0 left-0 w-64 h-screen pt-16 transition-transform bg-sidebar border-r border-gray-200 z-40 ' + (isOpen() ? 'translate-x-0' : '-translate-x-full sm:translate-x-0')">
    <div class="h-full overflow-y-auto py-4 px-2 space-y-4">
        @for (group of menuGroups; track group.groupLabel) {
            <div>
                <p class="px-4 pb-1 text-white/40 uppercase text-xs font-semibold tracking-wider">{{ group.groupLabel }}</p>
                <ul class="space-y-0.5">
                    @for (item of group.items; track item.label) {
                        <li>
                            @if (item.disabled) {
                                <span class="flex items-center justify-between gap-3 py-2 px-4 text-white/40 rounded-lg cursor-not-allowed">
                                    <div class="flex items-center gap-3">
                                        <i [class]="item.icon"></i>
                                        <span class="text-sm">{{ item.label }}</span>
                                    </div>
                                    @if (item.badge) {
                                        <span class="text-[10px] bg-white/10 text-white/50 px-1.5 py-0.5 rounded font-medium">{{ item.badge }}</span>
                                    }
                                </span>
                            } @else {
                                <a [routerLink]="[item.route]"
                                   routerLinkActive="bg-white/20"
                                   (click)="onNavigate()"
                                   class="flex items-center gap-3 py-2 px-4 text-white rounded-lg hover:bg-white/10 transition-colors text-sm">
                                    <i [class]="item.icon"></i>
                                    <span>{{ item.label }}</span>
                                </a>
                            }
                        </li>
                    }
                </ul>
            </div>
        }
    </div>
</aside>
