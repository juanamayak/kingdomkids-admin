<div class="relative w-full h-full min-h-screen overflow-hidden">
    <!-- Fondo con imagen -->
    <div class="absolute inset-0 bg-login bg-cover bg-no-repeat bg-center"></div>

    <!-- Overlay oscuro -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- Contenido encima -->
    <div class="relative z-10 flex flex-col justify-center items-center w-full h-full min-h-screen p-4 sm:p-6 md:p-8">
        <div class="w-full max-w-md md:max-w-2xl lg:max-w-4xl p-3 rounded-2xl md:rounded-3xl bg-white shadow-lg">
            <div class="flex flex-col md:flex-row md:min-h-[400px]">
                <!-- Formulario de login -->
                <div class="w-full md:w-1/2 p-6 sm:p-8 md:p-12 lg:p-8 space-y-5 order-2 md:order-1">
                    <!-- Logo visible solo en móvil -->
                    <div class="flex justify-center md:hidden mb-4">
                        <img [src]="logo" class="w-40 sm:w-48" alt="Logo">
                    </div>

                    <div class="text-center md:text-left">
                        <h3 class="text-2xl sm:text-3xl font-bold text-sky-600">Bienvenido</h3>
                        <p class="font-normal text-gray-600 text-sm sm:text-base">Ingresa tu usuario y contraseña</p>
                    </div>

                    <form [formGroup]="loginForm" class="space-y-4" (keydown.enter)="onLogin()">
                        <div class="flex flex-col gap-1">
                            <label>Nombre de usuario</label>
                            <input type="text" pInputText formControlName="username" class="w-full"/>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label>Contraseña</label>
                            <p-password [feedback]="false" [toggleMask]="true" formControlName="password" styleClass="w-full" inputStyleClass="w-full"/>
                        </div>
                        <div>
                            <p-button
                                label="Iniciar sesión"
                                size="small"
                                icon="pi pi-sign-in"
                                styleClass="w-full"
                                (click)="onLogin()"
                                [loading]="isLoading"
                            />
                        </div>
                    </form>
                </div>

                <!-- Panel lateral con logo (oculto en móvil) -->
                <div class="hidden md:block md:w-1/2 relative rounded-2xl overflow-hidden order-1 md:order-2">
                    <div class="absolute inset-0 bg-sky-950 bg-cover bg-no-repeat bg-center"></div>
                    <div class="relative z-10 flex flex-col justify-center items-center w-full h-full min-h-[200px] gap-4">
                        <img [src]="logo" class="mx-auto w-1/2 lg:w-48" alt="Logo">
                        @if (projectName) {
                            <span class="text-white text-xl font-semibold">{{ projectName }}</span>
                        }
                    </div>
                </div>
            </div>
        </div>

        <p class="text-white mt-3 text-xs sm:text-sm text-center px-4">
            &#64; {{ currentYear }} {{ copyright }}. Todos los derechos reservados.
        </p>
    </div>
</div>
